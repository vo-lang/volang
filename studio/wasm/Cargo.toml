[workspace]

[package]
name = "vo-studio-wasm"
version = "0.1.0"
edition = "2021"

[package.metadata.wasm-pack.profile.release]
wasm-opt = false

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
vo-web = { path = "../../lang/crates/vo-web" }
vo-web-runtime-wasm = { path = "../../lang/crates/vo-web/runtime-wasm" }
vo-common = { path = "../../lang/crates/vo-common" }
vo-runtime = { path = "../../lang/crates/vo-runtime", default-features = false }
vo-module = { path = "../../lang/crates/vo-module" }
vo-vm = { path = "../../lang/crates/vo-vm", default-features = false }
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
js-sys = "0.3"
web-sys = { version = "0.3", features = ["console"] }
console_error_panic_hook = "0.1"

[patch."https://github.com/vo-lang/volang"]
vo-common    = { path = "../../lang/crates/vo-common" }
vo-engine    = { path = "../../lang/crates/vo-engine" }
vo-ext       = { path = "../../lang/crates/vo-ext" }
vo-ffi-macro = { path = "../../lang/crates/vo-ffi-macro" }
vo-module    = { path = "../../lang/crates/vo-module" }
vo-release   = { path = "../../lang/crates/vo-release" }
vo-runtime   = { path = "../../lang/crates/vo-runtime" }
vo-stdlib    = { path = "../../lang/crates/vo-stdlib" }
vo-syntax    = { path = "../../lang/crates/vo-syntax" }
vo-vm        = { path = "../../lang/crates/vo-vm" }

