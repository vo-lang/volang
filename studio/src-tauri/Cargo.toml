[package]
name = "studio"
version = "0.1.0"
edition = "2021"

[lib]
name = "studio_lib"
crate-type = ["rlib", "staticlib", "cdylib"]

[[bin]]
name = "studio"
path = "src/main.rs"

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = ["devtools"] }
serde = { version = "1", features = ["derive"] }
toml = "0.8"
dirs = "5"
flate2 = { version = "1", default-features = false, features = ["rust_backend"] }
tar = "0.4"
ureq = "2"
vo-engine = { path = "../../lang/crates/vo-engine" }
vo-ext = { path = "../../lang/crates/vo-ext" }
vo-module = { path = "../../lang/crates/vo-module" }
vo-runtime = { path = "../../lang/crates/vo-runtime" }
vo-vm = { path = "../../lang/crates/vo-vm" }
vogui-protocol = { path = "../../../vogui/rust/protocol" }

[patch."https://github.com/vo-lang/volang"]
vo-common    = { path = "../../lang/crates/vo-common" }
vo-engine    = { path = "../../lang/crates/vo-engine" }
vo-ext       = { path = "../../lang/crates/vo-ext" }
vo-ffi-macro = { path = "../../lang/crates/vo-ffi-macro" }
vo-module    = { path = "../../lang/crates/vo-module" }
vo-runtime   = { path = "../../lang/crates/vo-runtime" }
vo-syntax    = { path = "../../lang/crates/vo-syntax" }
vo-vm        = { path = "../../lang/crates/vo-vm" }
