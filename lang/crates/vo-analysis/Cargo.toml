[package]
name = "vo-analysis"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
description = "Semantic analysis and type checking for the Vo programming language"
repository.workspace = true
homepage.workspace = true
readme.workspace = true
publish = ["crates-io"]

[dependencies]
vo-common = { workspace = true, default-features = false }
vo-common-core = { workspace = true, features = ["std"] }
vo-syntax.workspace = true
vo-module = { workspace = true, features = ["native-registry"] }
num-bigint = "0.4"
num-rational = "0.4"
num-traits = "0.2"
ordered-float = "4.2"

[dev-dependencies]
