[package]
name = "vo-ext"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
description = "SDK for creating Vo native extensions"
repository.workspace = true
homepage.workspace = true
readme.workspace = true
publish = ["crates-io"]

[lib]
crate-type = ["rlib"]

[features]
default = ["native"]
# Native platform: use the runtime's linkme registration via dlopen
native = ["vo-runtime/std"]
# WASM platform: static registration plus the browser protocol export helper
wasm = []

[dependencies]
vo-common-core = { workspace = true, default-features = false }
vo-runtime = { workspace = true, default-features = false }
vo-ffi-macro.workspace = true
