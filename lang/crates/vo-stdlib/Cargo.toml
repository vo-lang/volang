[package]
name = "vo-stdlib"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
description = "Vo standard library: Vo source files + platform extern implementations"
repository.workspace = true
homepage.workspace = true
readme.workspace = true
publish = ["crates-io"]

[lib]
crate-type = ["rlib"]

[features]
default = []
source = ["dep:vo-common", "dep:vo-stdlib-source"]
std = ["source", "vo-runtime/std", "memchr/std", "regex/std", "regex-syntax/std", "dep:vo-module", "dep:lazy_static", "dep:dirs", "dep:hostname", "dep:linkme", "dep:libc", "dep:nix", "dep:ureq", "dep:chrono", "dep:chrono-tz"]

[dependencies]
libm.workspace = true
vo-runtime = { workspace = true, default-features = false }
vo-common = { workspace = true, default-features = false, optional = true }
vo-common-core = { workspace = true, default-features = false }
vo-ffi-macro.workspace = true
vo-module = { workspace = true, default-features = false, features = ["native-registry"], optional = true }
vo-stdlib-source = { workspace = true, optional = true }
ryu = "1"
# Keep regexp available to alloc-only and WASM builds. Go's Perl classes and
# word boundaries are ASCII, so the large unicode-perl/segment/age tables are
# deliberately excluded; Unicode literals, simple folding, categories, and
# scripts remain supported. These exact pins are a language-semantics guard:
# regex-syntax 0.8.10 and ICU4X 2.0 both ship Unicode 16.0 data. Update them,
# unicode.Version, and the cross-package version-lock tests together.
regex = { version = "1", default-features = false, features = ["perf", "unicode-case", "unicode-gencat", "unicode-script"] }
memchr = { version = "2", default-features = false }
regex-syntax = { version = "=0.8.10", default-features = false, features = ["unicode-case", "unicode-gencat", "unicode-script"] }
icu_properties = { version = "=2.0.2", default-features = false, features = ["compiled_data"] }
icu_casemap = { version = "=2.0.1", default-features = false, features = ["compiled_data"] }

# std-only dependencies
lazy_static = { version = "1.4", optional = true }
dirs = { version = "5", optional = true }
hostname = { version = "0.4", optional = true }
linkme = { version = "0.3", optional = true }
libc = { version = "0.2", optional = true }
nix = { version = "0.29", optional = true, features = ["signal", "process"] }
ureq = { version = "2", optional = true, features = ["tls"] }
chrono = { version = "0.4", optional = true, features = ["clock"] }
chrono-tz = { version = "0.9", optional = true }

[dev-dependencies]
vo-common = { workspace = true, default-features = false }
vo-syntax = { workspace = true, default-features = false }
