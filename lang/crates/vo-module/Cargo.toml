[package]
name = "vo-module"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Vo module system: identity, schema, resolution, registry, and build policy"

[dependencies]
vo-common = { path = "../vo-common", default-features = false }
vo-syntax = { path = "../vo-syntax" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
toml = "0.8"
sha2 = "0.10"
flate2 = { version = "1", default-features = false, features = ["rust_backend"] }
tar = "0.4"

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
ureq = { version = "2", features = ["gzip"] }

[target.'cfg(target_arch = "wasm32")'.dependencies]
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
js-sys = "0.3"

[target.'cfg(target_arch = "wasm32")'.dependencies.web-sys]
version = "0.3"
features = ["Window", "Request", "RequestInit", "RequestCache", "Response", "Headers"]

[dev-dependencies]
tempfile = "3.10"
