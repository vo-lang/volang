[package]
name = "vo-engine"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Vo compilation and execution core - compile and run Vo programs"

[features]
default = ["jit"]
jit = ["vo-vm/jit"]

[dependencies]
vo-stdlib = { path = "../vo-stdlib", features = ["std"] }
vo-vm = { path = "../vo-vm" }
vo-runtime = { path = "../vo-runtime" }
vo-common = { path = "../vo-common" }
vo-common-core = { path = "../vo-common-core" }
vo-analysis = { path = "../vo-analysis" }
vo-codegen = { path = "../vo-codegen" }
vo-module = { path = "../vo-module" }
vo-syntax = { path = "../vo-syntax" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.10"

[dev-dependencies]
flate2 = { version = "1", default-features = false, features = ["rust_backend"] }
tar = "0.4"
