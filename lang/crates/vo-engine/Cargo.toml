[package]
name = "vo-engine"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
description = "Vo compilation and execution core - compile and run Vo programs"
repository.workspace = true
homepage.workspace = true
publish = false

[features]
default = ["jit"]
jit = ["vo-vm/jit"]

[dependencies]
vo-stdlib = { path = "../vo-stdlib", features = ["std"] }
vo-vm = { path = "../vo-vm" }
vo-runtime = { path = "../vo-runtime" }
vo-common = { path = "../vo-common" }
vo-common-core = { path = "../vo-common-core" }
vo-analysis = { path = "../vo-analysis" }
vo-codegen = { path = "../vo-codegen" }
vo-module = { path = "../vo-module" }
vo-syntax = { path = "../vo-syntax" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.10"
dirs = "5"

[target.'cfg(all(unix, not(target_arch = "wasm32")))'.dependencies]
libc = "0.2"

[target.'cfg(windows)'.dependencies]
windows-sys = { version = "0.61", features = [
    "Wdk_Foundation",
    "Wdk_Storage_FileSystem",
    "Win32_Foundation",
    "Win32_Security",
    "Win32_Storage_FileSystem",
    "Win32_System_IO",
] }

[dev-dependencies]
flate2 = { version = "1", default-features = false, features = ["rust_backend"] }
tar = "0.4"
zip = { version = "2.2", default-features = false, features = ["deflate"] }
