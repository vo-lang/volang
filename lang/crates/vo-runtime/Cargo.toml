[package]
name = "vo-runtime"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
description = "Vo language runtime - shared data structures for VM and JIT (no_std compatible)"
repository.workspace = true
homepage.workspace = true
readme.workspace = true
publish = ["crates-io"]

[features]
default = ["std"]
std = ["vo-common-core/std", "linkme", "regex", "libloading", "lazy_static", "dirs", "hostname", "libc"]
gc-debug = ["std"]  # GC 验证模式，需要 std

[dependencies]
vo-common-core.workspace = true
vo-ffi-macro.workspace = true  # Always available (macro generates cfg-gated code)
hashbrown = "0.15"

# Std only
linkme = { version = "0.3", optional = true }
regex = { version = "1", optional = true }
libloading = { version = "0.8", optional = true }
lazy_static = { version = "1.4", optional = true }
dirs = { version = "5.0", optional = true }
hostname = { version = "0.3", optional = true }
libc = { version = "0.2", optional = true }

[dev-dependencies]
vo-source-contract = { path = "../vo-source-contract" }
