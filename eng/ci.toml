version = 1

[changed_files]
fallback = ["cargo-fmt", "ci-self-check", "test-data-lint", "vo-test"]
unknown_path_policy = "fallback"

[[matrix]]
name = "pr"

[[matrix.unit]]
selector = "ci-pr-policy"
title = "Policy and build hygiene"
tier = "fast"

[[matrix.unit]]
selector = "ci-pr-vm-jit"
title = "VM and JIT"
tier = "contract"

[[matrix.unit]]
selector = "ci-pr-runtime-gc"
title = "Runtime and GC"
tier = "contract"

[[matrix.unit]]
selector = "ci-pr-compiler-ffi"
title = "Compiler and FFI"
tier = "contract"

[[matrix.unit]]
selector = "ci-pr-language"
title = "Language targets"
tier = "contract"

[[matrix.unit]]
selector = "ci-pr-release-smoke"
title = "Release smoke"
tier = "release"

[[matrix.unit]]
selector = "ci-pr-studio"
title = "Studio and quickplay"
tier = "contract"

[[matrix.unit]]
selector = "ci-pr-release-verify"
title = "Release verification"
tier = "release"

[[matrix]]
name = "qualification"

[[matrix.unit]]
selector = "qualification-vm"
title = "VM stress qualification"
tier = "stress"

[[matrix.unit]]
selector = "qualification-release"
title = "Release qualification"
tier = "release"

[[known_prefix]]
path = "skills/**"
tasks = ["cargo-fmt", "ci-self-check", "test-data-lint", "vo-test"]

[[known_prefix]]
path = "Cargo.lock"
tasks = ["cargo-fmt", "ci-self-check", "test-data-lint", "vo-test", "quickplay-validate", "no-std-dependency-closure", "sdk-package-offline-consumer"]

[[known_prefix]]
path = "Cargo.toml"
tasks = ["cargo-fmt", "ci-self-check", "test-data-lint", "vo-test", "no-std-dependency-closure", "sdk-package-offline-consumer"]

[[known_prefix]]
path = "README.md"
tasks = ["docs-lint", "ci-self-check", "sdk-package-offline-consumer"]

[[known_prefix]]
path = "rust-toolchain.toml"
tasks = ["cargo-fmt", "ci-self-check", "test-data-lint", "vo-test", "no-std-dependency-closure", "sdk-package-offline-consumer"]

[[known_prefix]]
path = ".cargo/config.toml"
tasks = ["cargo-fmt", "ci-self-check", "test-data-lint", "vo-test", "no-std-dependency-closure", "sdk-package-offline-consumer"]

[[known_prefix]]
path = "cmd/vo-dev/**"
tasks = ["eng-lint-tasks", "cargo-test-vo-dev", "vo-fmt-check"]

[[known_prefix]]
path = "docs/**"
tasks = ["docs-lint"]

[[known_prefix]]
path = "lang/docs/dev/voplay*.md"
tasks = ["docs-lint", "ci-self-check"]

[[known_prefix]]
path = "lang/docs/**"
tasks = ["docs-lint", "ci-self-check"]

[[known_prefix]]
path = "apps/studio/docs/**"
tasks = ["docs-lint", "studio-build"]

[[known_prefix]]
path = "apps/playground-legacy/src/assets/docs/generated/**"
tasks = ["docs-lint"]

[[known_prefix]]
path = ".github/workflows/**"
tasks = ["docs-lint", "ci-self-check"]

[[known_prefix]]
path = "scripts/ci/**"
# GitHub's Ubuntu runners do not provide a stable WebGPU adapter. Browser render
# baselines stay available through the local app-site/full task surfaces.
tasks = [
  "eng-lint-tasks",
  "docs-lint",
  "ci-self-check",
  "quickplay-validate",
  "wasm-ext-lifecycle-unit",
  "studio-browser-smoke",
  "blockkart-smoke-static",
]

[[known_prefix]]
path = "scripts/ci/sdk_package_offline_consumer.mjs"
tasks = ["sdk-package-offline-consumer"]

[[known_prefix]]
path = "scripts/ci/no_std_dependency_closure.mjs"
tasks = ["no-std-dependency-closure"]

[[known_prefix]]
path = "eng/project.toml"
tasks = [
  "eng-lint-tasks",
  "cargo-test-vo-dev",
  "quickplay-validate",
]

[[known_prefix]]
path = "eng/artifacts.toml"
