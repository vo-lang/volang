version = 1

[[artifact]]
name = "studio.quickplay.blockkart"
class = "generated-checked-in"
path = "apps/studio/public/quickplay/blockkart"
owner = "studio"
generator = ["vo-dev", "task", "run", "task:quickplay-blockkart-package"]
validator = ["vo-dev", "task", "run", "task:quickplay-validate"]
provenance = "apps/studio/public/quickplay/blockkart/provenance.json"
max_total_bytes = 35000000
allowed_extensions = [".json", ".js", ".wasm", ".vpak"]
inputs = [
  "apps/studio/scripts/package_blockkart_quickplay.mjs",
  "eng/project.toml",
  "external:BlockKart",
  "first-party:voplay",
  "module-cache:vopack",
  "module-cache:vogui",
]
tracked = true
approval = "checked-in-generated"

[[artifact]]
name = "studio.fixture.blockkart-vpak"
class = "fixture"
path = "apps/studio/fixtures/blockkart/blockkart.vpak"
owner = "studio"
tracked = true
allowed_extensions = [".vpak"]

[[artifact]]
name = "playground.generated-docs"
