version = 2

[package]
crate = "vo"
binary = "vo"
artifact_prefix = "vo"
build_args = ["--release", "--locked", "-p", "vo", "--no-default-features", "--features", "jit"]
release_opt_level = "3"
release_lto = "thin"

[sdk]
registry = "crates-io"
internal_standalone = [
  "apps/studio/src-tauri",
  "apps/studio/wasm",
]
packages = [
  "vo-common-core",
  "vo-stdlib-source",
  "vo-common",
  "vo-syntax",
  "vo-module",
  "vo-analysis",
  "vo-ffi-macro",
  "vo-runtime",
  "vo-ext",
  "vo-stdlib",
]

[notes]
product_name = "Vo"
homebrew = [
  "brew tap vo-lang/vo",
  "brew install vo",
]
manual_install = "Download the binary for your platform below, extract, and place `vo` on your PATH."

[homebrew]
repository = "vo-lang/homebrew-vo"
formula_path = "Formula/vo.rb"

[[target]]
target = "aarch64-apple-darwin"
os = "macos-15"

[[target]]
target = "x86_64-apple-darwin"
os = "macos-15-intel"

[[target]]
target = "x86_64-unknown-linux-gnu"
os = "ubuntu-22.04"

[[target]]
target = "aarch64-unknown-linux-gnu"
os = "ubuntu-22.04-arm"
