# The app surface intentionally stays small: build/package the demo, validate it,
# and prove one browser/static/baseline run. Heavier diagnostics remain explicit.
pr = [
  "quality",
  "test",
  "runtime-contract",
  "runtime-surface-contract",
  "jit-contract",
  "vm-hardening",
  "typechecker-contract",
  "codegen-contract",
  "ffi-contract",
  "vo-dev-contract",
  "module-contract",
  "docs",
  "examples",
  "benchmarks",
  "app-contract",
  "app-site",
  "release-verify",
]

# GitHub Actions executes these units. Each PR task belongs to exactly one unit,
# so dependencies are resolved once inside that unit instead of once in the
# matrix planner and again in every task job.
ci-pr-policy = [
  "ci-self-check",
  "d-py-smoke",
  "eng-lint-tasks",
  "docs-lint",
  "eng-lint-benchmarks",
  "node-audit-current",
  "cargo-fmt",
  "vo-fmt-check",
  "cargo-clippy",
  "wasm-check",
]

ci-pr-vm-jit = [
  "cargo-test-common-core",
  "cargo-test-jit",
  "cargo-test-vo-source-contract",
  "cargo-test-vm",
  "cargo-test-vm-hardening-jit",
]

ci-pr-runtime-gc = [
  "cargo-test-runtime",
  "cargo-test-gc-runtime",
  "cargo-test-gc-vm",
  "cargo-test-gc-vm-jit",
  "cargo-test-gc-jit",
