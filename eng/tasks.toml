  "no-std-dependency-closure",
  "sdk-package-offline-consumer",
  "cargo-package-stdlib-source",
  "cargo-test-stdlib",
  "cargo-test-web-runtime-wasm",
  "vo-web-vfs-unit",
  "cargo-test-ffi-macro",
  "cargo-test-vo-ext",
  "cargo-check-vo-ext-wasm",
  "cargo-test-analysis",
  "cargo-test-codegen",
  "cargo-test-module",
  "cargo-check-module-windows",
  "cargo-test-web-hardening",
  "cargo-test-studio-wasm-source-contract",
  "cargo-test-vo-dev",
  "cargo-test-vo-test",
]

ci-pr-language = [
  "vo-test",
  "vo-test-compile",
  "vo-test-runtime-contract",
  "vo-test-runtime-language-contract",
  "vo-test-jit-contract",
  "vo-test-osr",
  "vo-test-nostd",
  "vo-test-wasm",
  "vo-test-gc",
]

ci-pr-release-smoke = [
  "examples-smoke",
  "cargo-test-release",
  "wasm-check-release",
  "vo-bench-jit-loop-smoke",
  "vo-gc-perf-root-table-smoke",
]

ci-pr-studio = [
  "wasm-ext-lifecycle-unit",
  "app-site",
]

ci-pr-release-verify = ["release-verify"]

qualification-vm = ["stress"]
qualification-release = ["release-verify"]

qualification = [
  "qualification-vm",
  "qualification-release",
]

full = [
  "quality",
  "test",
  "contract",
  "vm-production",
  "site",
  "release-verify",
  "legacy-excluded",
]

[[group]]
name = "quality"
title = "Quality"
tier_intent = "fast PR policy and source hygiene"
owner = "eng"
tags = ["quality", "repo-policy"]
tasks = ["ci-self-check", "d-py-smoke", "eng-lint-tasks", "docs-lint", "eng-lint-examples", "eng-lint-benchmarks", "node-audit-current", "cargo-fmt", "vo-fmt-check", "cargo-clippy", "wasm-check"]
included_in = ["pr", "full"]
selection_policy = "Selected when the quality validation surface is requested or when a parent group includes it."

[[group]]
name = "docs"
title = "Docs"
tier_intent = "documentation policy checks"
owner = "docs"
tags = ["docs", "docs-policy"]
tasks = ["docs-lint"]
included_in = ["pr"]
selection_policy = "Selected when the docs validation surface is requested or when a parent group includes it."

[[group]]
name = "examples"
title = "Examples"
tier_intent = "example manifest and smoke checks"
owner = "eng"
tags = ["examples", "example-smoke"]
tasks = ["eng-lint-examples", "examples-smoke"]
included_in = ["test", "pr"]
selection_policy = "Selected when the examples validation surface is requested or when a parent group includes it."

[[group]]
name = "benchmarks"
