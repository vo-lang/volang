version = 1

[tools.rust]
source = "rust-toolchain.toml"
required = true
check = ["cargo", "--version"]

[tools.node]
version = "24"
required = true
check = ["node", "--version"]

[tools.npm]
version_from = "node"
required = true
check = ["npm", "--version"]

[tools.wasm-pack]
version = "0.14.0"
required = true
check = ["wasm-pack", "--version"]

[tools.hyperfine]
version = "1.20.0"
required = true
usage = "vo-dev benchmark smoke tasks"
check = ["hyperfine", "--version"]
bootstrap = ["cargo", "install", "hyperfine", "--locked", "--version", "1.20.0"]

[tools.python]
minimum = "3.9"
required = true
usage = "d.py compatibility wrapper"
check = ["python3", "--version"]

[tools.vo-dev]
source = "cmd/vo-dev"
required = true

[[node_workspace]]
name = "studio"
path = "apps/studio"
lockfile = "apps/studio/package-lock.json"
audit = "current"
audit_level = "high"

[[node_workspace]]
name = "vo-web"
path = "lang/crates/vo-web"
lockfile = "lang/crates/vo-web/package-lock.json"
audit = "current"
audit_level = "high"
