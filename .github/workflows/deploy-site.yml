name: Deploy Studio to GitHub Pages

on:
  push:
    branches: ["main"]
    paths:
      - "studio/**"
      - "lang/crates/**"
      - ".github/workflows/deploy-site.yml"
      - ".github/actions/setup-rust/**"
      - "studio/scripts/build_wasm.mjs"
      - "scripts/ci/**"
      - "rust-toolchain.toml"
      - "Cargo.toml"
      - "Cargo.lock"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout volang
        uses: actions/checkout@v5

      - name: Checkout vogui
        uses: actions/checkout@v5
        with:
          repository: vo-lang/vogui
          path: vogui

      - name: Install Rust
        uses: ./.github/actions/setup-rust

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
            studio/wasm -> target

      - name: Install wasm-pack
        run: cargo install wasm-pack --locked --version 0.13.1

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: |
            studio/package-lock.json
            vogui/js/package-lock.json

      - name: Build vo-web WASM
        working-directory: lang/crates/vo-web
        run: wasm-pack build --target web --release

      - name: Build VoGUI JS
        working-directory: vogui/js
        run: npm ci && npm run build

      - name: Build studio WASM
        working-directory: studio
        run: npm run build:wasm

      - name: Install Studio dependencies
        working-directory: studio
        run: npm ci

      - name: Install @vogui/runtime from local build
        working-directory: studio
        run: npm install --no-save ../vogui/js

      - name: Build Studio
        working-directory: studio
        run: npm run build

      - name: Validate BlockKart quickplay package
        run: python3 scripts/ci/run.py task quickplay-validate

      - name: Smoke BlockKart static package
        run: python3 scripts/ci/run.py task blockkart-smoke-static

      - name: Archive Pages artifact
        run: |
          test -d studio/dist
          find studio/dist -mindepth 1 -print -quit | grep -q .
          tar \
            --dereference --hard-dereference \
            --directory studio/dist \
            -cvf "$RUNNER_TEMP/artifact.tar" \
            --exclude=.git \
            --exclude=.github \
            --exclude=".[^/]*" \
            .

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: github-pages
          path: ${{ runner.temp }}/artifact.tar
          retention-days: 1

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout volang
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Smoke BlockKart deployment
        run: node scripts/ci/smoke_blockkart.mjs --base-url "${{ steps.deployment.outputs.page_url }}" --build-id "${{ github.sha }}-${{ github.run_id }}-${{ github.run_attempt }}"
