name: Deploy Studio to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      node_version: ${{ steps.ci_metadata.outputs.node_version }}
    steps:
      - name: Checkout volang
        uses: actions/checkout@v5

      - name: Install Rust
        uses: ./.github/actions/setup-rust

      - name: Read CI metadata
        id: ci_metadata
        run: cargo run -q -p vo-dev -- ci metadata site --github-output

      - name: Checkout vogui
        if: steps.ci_metadata.outputs.checkout_vogui == 'true'
        uses: actions/checkout@v5
        with:
          repository: ${{ steps.ci_metadata.outputs.checkout_vogui_repository }}
          path: ${{ steps.ci_metadata.outputs.checkout_vogui_path }}
          ref: ${{ steps.ci_metadata.outputs.checkout_vogui_expected_commit }}

      - name: Checkout voplay
        if: steps.ci_metadata.outputs.checkout_voplay == 'true'
        uses: actions/checkout@v5
        with:
          repository: ${{ steps.ci_metadata.outputs.checkout_voplay_repository }}
          path: ${{ steps.ci_metadata.outputs.checkout_voplay_path }}
          ref: ${{ steps.ci_metadata.outputs.checkout_voplay_expected_commit }}

      - name: Checkout vopack
        if: steps.ci_metadata.outputs.checkout_vopack == 'true'
        uses: actions/checkout@v5
        with:
          repository: ${{ steps.ci_metadata.outputs.checkout_vopack_repository }}
          path: ${{ steps.ci_metadata.outputs.checkout_vopack_path }}
          ref: ${{ steps.ci_metadata.outputs.checkout_vopack_expected_commit }}

      - name: Checkout vostore
        if: steps.ci_metadata.outputs.checkout_vostore == 'true'
        uses: actions/checkout@v5
        with:
          repository: ${{ steps.ci_metadata.outputs.checkout_vostore_repository }}
          path: ${{ steps.ci_metadata.outputs.checkout_vostore_path }}
          ref: ${{ steps.ci_metadata.outputs.checkout_vostore_expected_commit }}

      - name: Checkout BlockKart
        if: steps.ci_metadata.outputs.checkout_blockkart == 'true'
        uses: actions/checkout@v5
        with:
          repository: ${{ steps.ci_metadata.outputs.checkout_blockkart_repository }}
          path: ${{ steps.ci_metadata.outputs.checkout_blockkart_path }}
          ref: ${{ steps.ci_metadata.outputs.checkout_blockkart_expected_commit }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ${{ steps.ci_metadata.outputs.rust_cache_workspaces }}

      - name: Install wasm-pack
        if: steps.ci_metadata.outputs.wasm_pack == 'true'
        run: cargo install wasm-pack --locked --version "${{ steps.ci_metadata.outputs.wasm_pack_version }}"

      - name: Setup Node
        if: steps.ci_metadata.outputs.node == 'true'
        uses: actions/setup-node@v5
        with:
          node-version: ${{ steps.ci_metadata.outputs.node_version }}
          cache: "npm"
          cache-dependency-path: ${{ steps.ci_metadata.outputs.node_lockfiles }}

      - name: Bootstrap site tools
        run: cargo run -q -p vo-dev -- tool bootstrap --task site --apply

      - name: Check site tools
        run: cargo run -q -p vo-dev -- tool check --task site

      - name: Build Studio site
        run: cargo run -q -p vo-dev -- task run site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: apps/studio/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout volang
        uses: actions/checkout@v5

      - name: Install Rust
        uses: ./.github/actions/setup-rust

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: ${{ needs.build.outputs.node_version }}

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Smoke BlockKart deployment
        env:
          BLOCKKART_SMOKE_BASE_URL: ${{ steps.deployment.outputs.page_url }}
        run: cargo run -q -p vo-dev -- task run task:blockkart-smoke-remote
