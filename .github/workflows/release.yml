name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14
            use_cross: false
          - target: x86_64-apple-darwin
            os: macos-15-intel
            use_cross: false
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            use_cross: false
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04
            use_cross: true

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --locked

      - name: Build vo CLI
        env:
          VO_BUILD_COMMIT: ${{ github.sha }}
          VO_BUILD_DATE: ${{ github.ref_name }}
          CARGO_PROFILE_RELEASE_OPT_LEVEL: "3"
          CARGO_PROFILE_RELEASE_LTO: "thin"
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }} -p vo --no-default-features
          else
            cargo build --release --target ${{ matrix.target }} -p vo --no-default-features
          fi

      - name: Package tarball
        shell: bash
        run: |
          BINARY=target/${{ matrix.target }}/release/vo
          TARBALL=vo-${{ matrix.target }}.tar.gz
          tar -czf "$TARBALL" -C "$(dirname $BINARY)" "$(basename $BINARY)"
          if command -v sha256sum &>/dev/null; then
            sha256sum "$TARBALL" > "$TARBALL.sha256"
          else
            shasum -a 256 "$TARBALL" > "$TARBALL.sha256"
          fi
          echo "TARBALL=$TARBALL" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vo-${{ matrix.target }}
          path: |
            vo-${{ matrix.target }}.tar.gz
            vo-${{ matrix.target }}.tar.gz.sha256

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-22.04
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: Vo ${{ github.ref_name }}
          body: |
            ## Vo ${{ github.ref_name }}

            ### Install via Homebrew
            ```sh
            brew tap vo-lang/vo
            brew install vo
            ```

            ### Manual install
            Download the binary for your platform below, extract, and place `vo` in your `$PATH`.
          files: |
            artifacts/*.tar.gz
            artifacts/*.sha256
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}

  update-homebrew:
    name: Update Homebrew Formula
    needs: release
    runs-on: ubuntu-22.04

    steps:
      - name: Download SHA256 files
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Read SHA256 values
        id: sha
        run: |
          echo "aarch64_apple=$(awk '{print $1}' artifacts/vo-aarch64-apple-darwin.tar.gz.sha256)" >> $GITHUB_OUTPUT
          echo "x86_64_apple=$(awk '{print $1}' artifacts/vo-x86_64-apple-darwin.tar.gz.sha256)" >> $GITHUB_OUTPUT
          echo "x86_64_linux=$(awk '{print $1}' artifacts/vo-x86_64-unknown-linux-gnu.tar.gz.sha256)" >> $GITHUB_OUTPUT
          echo "aarch64_linux=$(awk '{print $1}' artifacts/vo-aarch64-unknown-linux-gnu.tar.gz.sha256)" >> $GITHUB_OUTPUT

      - name: Checkout homebrew-vo
        uses: actions/checkout@v4
        with:
          repository: vo-lang/homebrew-vo
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-vo

      - name: Update Formula
        env:
          VERSION: ${{ needs.release.outputs.version }}
          SHA_AARCH64_APPLE: ${{ steps.sha.outputs.aarch64_apple }}
          SHA_X86_64_APPLE: ${{ steps.sha.outputs.x86_64_apple }}
          SHA_X86_64_LINUX: ${{ steps.sha.outputs.x86_64_linux }}
          SHA_AARCH64_LINUX: ${{ steps.sha.outputs.aarch64_linux }}
        run: |
          cd homebrew-vo
          sed -i "s/version \".*\"/version \"$VERSION\"/" Formula/vo.rb
          sed -i "s/PLACEHOLDER_AARCH64_APPLE_DARWIN/$SHA_AARCH64_APPLE/" Formula/vo.rb
          sed -i "s/PLACEHOLDER_X86_64_APPLE_DARWIN/$SHA_X86_64_APPLE/" Formula/vo.rb
          sed -i "s/PLACEHOLDER_X86_64_UNKNOWN_LINUX_GNU/$SHA_X86_64_LINUX/" Formula/vo.rb
          sed -i "s/PLACEHOLDER_AARCH64_UNKNOWN_LINUX_GNU/$SHA_AARCH64_LINUX/" Formula/vo.rb

      - name: Commit and push Formula update
        run: |
          cd homebrew-vo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/vo.rb
          git commit -m "vo ${{ needs.release.outputs.version }}"
          git push
