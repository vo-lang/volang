name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  plan:
    name: Plan Release
    runs-on: ubuntu-22.04
    outputs:
      matrix: ${{ steps.plan.outputs.matrix }}
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: ./.github/actions/setup-rust

      - name: Plan release targets
        id: plan
        run: cargo run -q -p vo-dev -- release matrix --github-output

  build:
    name: Build ${{ matrix.target }}
    needs: plan
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.plan.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: ./.github/actions/setup-rust

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --locked --version "$(cargo run -q -p vo-dev -- release cross-version)"

      - name: Build vo CLI
        env:
          VO_BUILD_COMMIT: ${{ github.sha }}
          VO_BUILD_DATE: ${{ github.ref_name }}
        run: cargo run -q -p vo-dev -- release build "${{ matrix.target }}"

      - name: Package tarball
        run: cargo run -q -p vo-dev -- release package "${{ matrix.target }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: vo-${{ matrix.target }}
          path: |
            ${{ matrix.artifact_name }}
            ${{ matrix.artifact_name }}.sha256

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-22.04
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: ./.github/actions/setup-rust

      - name: Extract version
        id: version
        run: cargo run -q -p vo-dev -- release version --github-output

      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts
          merge-multiple: true

      - name: Write release notes
        run: cargo run -q -p vo-dev -- release notes --tag "${{ github.ref_name }}" --out RELEASE_NOTES.md

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
        run: cargo run -q -p vo-dev -- release publish --tag "${{ github.ref_name }}" --artifacts artifacts --notes RELEASE_NOTES.md

  update-homebrew:
    name: Update Homebrew Formula
    needs: release
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout volang
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: ./.github/actions/setup-rust

      - name: Read Homebrew metadata
        id: homebrew
        run: cargo run -q -p vo-dev -- release homebrew-metadata --github-output

      - name: Download SHA256 files
        uses: actions/download-artifact@v7
        with:
          path: artifacts
          merge-multiple: true

      - name: Checkout Homebrew tap
        uses: actions/checkout@v5
        with:
          repository: ${{ steps.homebrew.outputs.repository }}
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: ${{ steps.homebrew.outputs.checkout_path }}

      - name: Update Formula
        run: cargo run -q -p vo-dev -- release update-homebrew --repo "${{ steps.homebrew.outputs.checkout_path }}" --artifacts artifacts --version "${{ needs.release.outputs.version }}"

      - name: Commit and push Formula update
        run: |
          cd "${{ steps.homebrew.outputs.checkout_path }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${{ steps.homebrew.outputs.formula_path }}"
          if git diff --cached --quiet; then
            echo "Formula already up to date"
            exit 0
          fi
          git commit -m "vo ${{ needs.release.outputs.version }}"
          git push
