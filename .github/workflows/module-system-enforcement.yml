name: Module System Enforcement

on:
  pull_request:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  plan:
    name: Plan CI
    runs-on: ubuntu-latest
    outputs:
      has_tasks: ${{ steps.plan.outputs.has_tasks }}
      matrix: ${{ steps.plan.outputs.matrix }}
      tasks: ${{ steps.plan.outputs.tasks }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Plan smart CI tasks
        id: plan
        env:
          BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
        run: python3 scripts/ci/plan.py --mode smart --base "$BASE_SHA" --head "$HEAD_SHA" --github-output

  task:
    name: ${{ matrix.title }}
    needs: plan
    if: needs.plan.outputs.has_tasks == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.plan.outputs.matrix) }}
    steps:
      - name: Checkout volang
        uses: actions/checkout@v5

      - name: Checkout first-party module
        if: matrix.repo != ''
        uses: actions/checkout@v5
        with:
          repository: vo-lang/${{ matrix.repo }}
          path: ci_modules/${{ matrix.repo }}

      - name: Install Rust
        if: matrix.rust
        uses: ./.github/actions/setup-rust

      - name: Rust cache
        if: matrix.rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
            studio/wasm -> target

      - name: Install wasm-pack
        if: matrix.wasm_pack
        run: cargo install wasm-pack --locked --version 0.13.1

      - name: Setup Node
        if: matrix.node
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: studio/package-lock.json

      - name: Run CI task
        run: python3 scripts/ci/run.py task "${{ matrix.task }}"

  gate:
    name: CI Gate
    runs-on: ubuntu-latest
    needs:
      - plan
      - task
    if: always()
    steps:
      - name: Check CI result
        env:
          PLAN_RESULT: ${{ needs.plan.result }}
          TASK_RESULT: ${{ needs.task.result }}
          HAS_TASKS: ${{ needs.plan.outputs.has_tasks }}
        run: |
          if [ "$PLAN_RESULT" != "success" ]; then
            echo "CI planning failed"
            exit 1
          fi
          if [ "$HAS_TASKS" = "true" ] && [ "$TASK_RESULT" != "success" ]; then
            echo "A planned CI task failed"
            exit 1
          fi
          echo "CI passed"
