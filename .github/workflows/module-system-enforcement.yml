name: Module System Enforcement

on:
  pull_request:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  plan:
    name: Plan CI
    runs-on: ubuntu-latest
    outputs:
      has_tasks: ${{ steps.plan.outputs.has_tasks }}
      matrix: ${{ steps.plan.outputs.matrix }}
      tasks: ${{ steps.plan.outputs.tasks }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: ./.github/actions/setup-rust

      - name: Plan smart CI tasks
        id: plan
        env:
          BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
        run: cargo run -q -p vo-dev -- ci matrix pr --base "$BASE_SHA" --head "$HEAD_SHA" --github-output

  task:
    name: ${{ matrix.title }}
    needs: plan
    if: needs.plan.outputs.has_tasks == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.plan.outputs.matrix) }}
    steps:
      - name: Checkout volang
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Checkout vogui
        if: matrix.checkout_vogui
        uses: actions/checkout@v5
        with:
          repository: ${{ matrix.checkout_vogui_repository }}
          path: ${{ matrix.checkout_vogui_path }}
          ref: ${{ matrix.checkout_vogui_expected_commit }}
          fetch-depth: 0

      - name: Checkout voplay
        if: matrix.checkout_voplay
        uses: actions/checkout@v5
        with:
          repository: ${{ matrix.checkout_voplay_repository }}
          path: ${{ matrix.checkout_voplay_path }}
          ref: ${{ matrix.checkout_voplay_expected_commit }}
          fetch-depth: 0

      - name: Checkout vopack
        if: matrix.checkout_vopack
        uses: actions/checkout@v5
        with:
          repository: ${{ matrix.checkout_vopack_repository }}
          path: ${{ matrix.checkout_vopack_path }}
          ref: ${{ matrix.checkout_vopack_expected_commit }}
          fetch-depth: 0

      - name: Checkout vostore
        if: matrix.checkout_vostore
        uses: actions/checkout@v5
        with:
          repository: ${{ matrix.checkout_vostore_repository }}
          path: ${{ matrix.checkout_vostore_path }}
          ref: ${{ matrix.checkout_vostore_expected_commit }}
          fetch-depth: 0

      - name: Checkout BlockKart
        if: matrix.checkout_blockkart
        uses: actions/checkout@v5
        with:
          repository: ${{ matrix.checkout_blockkart_repository }}
          path: ${{ matrix.checkout_blockkart_path }}
          ref: ${{ matrix.checkout_blockkart_expected_commit }}
          fetch-depth: 0

      - name: Install Linux task dependencies
        if: matrix.linux_packages != ''
        run: |
          sudo apt-get update
          sudo apt-get install --yes ${{ matrix.linux_packages }}

      - name: Install Rust
        if: matrix.rust
        uses: ./.github/actions/setup-rust

      - name: Rust cache
        if: matrix.rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ${{ matrix.rust_cache_workspaces }}

      - name: Setup Python
        if: matrix.python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python_version }}

      - name: Setup Node
        if: matrix.node
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node_version }}
          cache: "npm"
          cache-dependency-path: ${{ matrix.node_lockfiles }}

      - name: Bootstrap task tools
        run: cargo run -q -p vo-dev -- tool bootstrap --task "${{ matrix.task }}" --apply

      - name: Check task tools
        run: cargo run -q -p vo-dev -- tool check --task "${{ matrix.task }}"

      - name: Run CI lane
        run: cargo run -q -p vo-dev -- task run "${{ matrix.task }}"

  gate:
    name: CI Gate
    runs-on: ubuntu-latest
    needs:
      - plan
      - task
    if: always()
    steps:
      - name: Check CI result
        env:
          PLAN_RESULT: ${{ needs.plan.result }}
          TASK_RESULT: ${{ needs.task.result }}
          HAS_TASKS: ${{ needs.plan.outputs.has_tasks }}
        run: |
          if [ "$PLAN_RESULT" != "success" ]; then
            echo "CI planning failed"
            exit 1
          fi
          if [ "$HAS_TASKS" = "true" ] && [ "$TASK_RESULT" != "success" ]; then
            echo "A planned CI task failed"
            exit 1
          fi
          echo "CI passed"
