[package]
name = "vo-playground"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
description = "Legacy browser playground host for the Vo toolchain"
repository.workspace = true
homepage.workspace = true
publish = false

[package.metadata.wasm-pack.profile.release]
wasm-opt = false

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
vo-web = { path = "../../../lang/crates/vo-web" }
vo-common = { path = "../../../lang/crates/vo-common" }
vo-module = { path = "../../../lang/crates/vo-module" }
vo-runtime = { path = "../../../lang/crates/vo-runtime", default-features = false }

wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
js-sys = "0.3"
web-sys = { version = "0.3", features = ["console"] }
