<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#080a12" />
  <meta name="description" content="Vo is a statically typed scripting language for the Rust ecosystem. Try it instantly in your browser." />
  <meta property="og:title" content="Vo — Code at the speed of thought" />
  <meta property="og:description" content="A compact, concurrent scripting language that embeds cleanly in Rust and runs on the VM, JIT, and WebAssembly." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://volang.dev/" />
  <link rel="canonical" href="https://volang.dev/" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <title>Vo — Code at the speed of thought</title>
</head>
<body>
  <div id="app"></div>
  <script>
    (() => {
      const localRunnerHost = location.hostname === 'localhost' || location.hostname === '127.0.0.1' || location.hostname === '::1' || location.hostname === '[::1]';
      const postPerfReport = (payload) => {
        const body = JSON.stringify(payload);
        try {
          fetch('/__voplay_perf_report', {
            method: 'POST',
            headers: { 'content-type': 'application/json' },
            body,
            keepalive: true,
          }).catch(() => {});
          return;
        } catch {}
        try {
          const blob = new Blob([body], { type: 'application/json' });
          if (navigator.sendBeacon) navigator.sendBeacon('/__voplay_perf_report', blob);
        } catch {}
      };
      const pagePayload = (kind) => ({
        schemaVersion: 1,
        source: 'studio-page',
        kind,
        mode: new URLSearchParams(location.search).get('voplayPerf') || 'stats',
        metrics: { href: location.href, hash: location.hash, search: location.search },
        nowMs: performance.now(),
        href: location.href,
        visibility: document.visibilityState,
        focus: document.hasFocus(),
      });
      const params = new URLSearchParams(location.search);
      if (localRunnerHost && location.hash.startsWith('#/runner') && !params.has('voplayPerf') && !params.has('perf')) {
        const url = new URL(location.href);
        url.searchParams.set('voplayPerf', 'stats');
        history.replaceState(null, '', url);
      }
      if (localRunnerHost) {
        postPerfReport(pagePayload(location.hash.startsWith('#/runner') ? 'runner-bootstrap' : 'page-bootstrap'));
        setTimeout(() => postPerfReport(pagePayload('page-heartbeat')), 500);
        setTimeout(() => postPerfReport(pagePayload('page-heartbeat')), 2500);
      }
    })();
  </script>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
